<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Life Calendar</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --surface: #111111;
            --card: #1c1c1c;
            --border: #272727;
            --border-light: #333333;
            --text: #efefef;
            --text-muted: #555555;
            --text-mid: #999999;
            --accent: #efefef;
            --accent-glow: rgba(239,239,239,0.15);
            --lived: #333333;
            --radius: 14px;
            --radius-sm: 9px;
            
            --sidebar-collapsed: 48px;
            --sidebar-expanded: 280px;
        }
        body[data-theme="light"] {
            --bg: #e2e0dc; --surface: #eceae6; --card: #ffffff;
            --border: #d0ceca; --border-light: #c0beba;
            --text: #141414; --text-muted: #9a9892; --text-mid: #4a4845;
            --accent: #141414; --accent-glow: rgba(20,20,20,0.1);
            --lived: #c0beba;
        }
        body[data-theme="miku"] {
            --bg: #FFF0F7; --surface: #f2fcfb; --card: #ffffff;
            --border: #99D5D0; --border-light: #BCE8E4;
            --text: #1A2B2A; --text-muted: #007871; --text-mid: #005D57;
            --accent: #E3007F; --accent-glow: rgba(227,0,127,0.2);
            --lived: #BCE8E4;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; scrollbar-width: none; -ms-overflow-style: none; }
        *::-webkit-scrollbar { display: none; }

        body {
            font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text);
            height: 100vh; display: flex; flex-direction: row; overflow: hidden;
            transition: background 0.3s ease, color 0.3s ease;
        }

        /* ── LEFT SIDEBAR ── */
        #left-sidebar {
            width: var(--sidebar-collapsed); background: var(--surface); border-right: 1px solid var(--border);
            display: flex; flex-direction: column; transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1), background 0.3s ease, border-color 0.3s ease;
            z-index: 1000; overflow: hidden; white-space: nowrap; flex-shrink: 0; 
        }
        body.sidebar-open #left-sidebar { width: var(--sidebar-expanded); }

        .sidebar-header {
            display: flex; align-items: center; height: 52px; padding: 0 8px; border-bottom: 1px solid var(--border); flex-shrink: 0;
            transition: border-color 0.3s, padding 0.3s;
        }
        body.sidebar-open .sidebar-header { padding: 0 16px; }
        .sidebar-toggle {
            background: transparent; border: none; color: var(--text-muted); cursor: pointer;
            width: 32px; height: 32px; border-radius: 6px; display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; transition: background 0.2s, color 0.2s;
        }
        .sidebar-toggle:hover { background: var(--card); color: var(--text); }
        .sidebar-toggle svg { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }

        .sidebar-title {
            font-family: 'Space Grotesk', sans-serif; font-size: 1.15rem; font-weight: 500;
            letter-spacing: -0.02em; color: var(--text); margin-left: 12px; opacity: 0; pointer-events: none;
            transition: opacity 0.2s ease;
        }
        body.sidebar-open .sidebar-title { opacity: 1; pointer-events: auto; }

        .sidebar-content-scroll {
            flex: 1; overflow-y: auto; display: flex; flex-direction: column;
            opacity: 0; pointer-events: none; transition: opacity 0.2s; padding-bottom: 20px;
        }
        body.sidebar-open .sidebar-content-scroll { opacity: 1; pointer-events: auto; }

        /* ── ACCORDION ── */
        .accordion { border-bottom: 1px solid var(--border); transition: border-color 0.3s; }
        .accordion-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 16px; cursor: pointer; user-select: none; transition: background 0.2s;
        }
        .accordion-header:hover { background: var(--card); }
        .acc-title { font-size: 0.80rem; font-weight: 600; color: var(--text-mid); text-transform: uppercase; letter-spacing: 0.05em; transition: color 0.2s; }
        .accordion-header:hover .acc-title { color: var(--text); }
        
        .acc-actions { display: flex; align-items: center; gap: 4px; }
        .acc-btn {
            background: transparent; border: none; color: var(--text-muted); cursor: pointer;
            width: 24px; height: 24px; border-radius: 4px; display: flex; align-items: center; justify-content: center;
            transition: background 0.2s, color 0.2s;
        }
        .acc-btn:hover { background: var(--border-light); color: var(--text); }
        .acc-btn svg { width: 16px; height: 16px; stroke-width: 2; fill: none; stroke: currentColor; stroke-linecap: round; stroke-linejoin: round;}
        
        .accordion-body { padding: 0 16px 16px; display: none; flex-direction: column; gap: 10px; }
        .accordion.open .accordion-body { display: flex; }
        .chevron { transition: transform 0.2s; }
        .accordion.open .chevron { transform: rotate(180deg); }

        /* ── FORMS ── */
        .sidebar-input {
            width: 100%; padding: 8px 10px; background: var(--card); border: 1px solid var(--border);
            border-radius: 6px; color: var(--text); font-family: 'Inter', sans-serif;
            font-size: 0.85rem; outline: none; transition: border-color 0.2s, background 0.3s;
        }
        .sidebar-input:focus { border-color: var(--accent); }
        
        /* Flex grid for dual inputs (Years & Months) */
        .duration-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

        .sidebar-form-actions { display: grid; grid-template-columns: 1fr auto auto; gap: 8px; margin-top: 4px; }

        .btn-primary { background: var(--accent); color: var(--bg); border: none; padding: 8px 12px; border-radius: 6px; font-weight: 600; font-family: 'Inter', sans-serif; font-size: 0.8rem; cursor: pointer; width: 100%; transition: transform 0.1s, background 0.3s ease, color 0.3s ease; }
        .btn-primary:active { transform: scale(0.98); }
        .btn-secondary { background: var(--card); color: var(--text); border: 1px solid var(--border); padding: 8px 12px; border-radius: 6px; font-family: 'Inter', sans-serif; cursor: pointer; font-size: 0.8rem; display: flex; align-items: center; gap: 6px; transition: background 0.2s, border-color 0.2s, color 0.3s ease; }
        .btn-secondary:hover { border-color: var(--border-light); }

        /* ── LIST ── */
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-radius: 6px; transition: background 0.2s; margin-bottom: 2px; }
        .list-item:hover { background: rgba(255,255,255,0.03); }
        .event-checkbox-wrapper { display: flex; align-items: center; gap: 10px; cursor: pointer; flex: 1; overflow: hidden; padding-left: 4px; }
        .event-checkbox-input { display: none; }
        .event-checkbox-box { width: 16px; height: 16px; border-radius: 4px; border: 2px solid var(--box-color); display: flex; align-items: center; justify-content: center; transition: all 0.2s; flex-shrink: 0; }
        .event-checkbox-input:checked + .event-checkbox-box { background-color: var(--box-color); border-color: var(--box-color); }
        .event-checkbox-box svg { width: 10px; height: 10px; stroke: var(--bg); stroke-width: 3; fill: none; stroke-linecap: round; stroke-linejoin: round; opacity: 0; transform: scale(0.5); transition: all 0.2s; }
        .event-checkbox-input:checked + .event-checkbox-box svg { opacity: 1; transform: scale(1); }
        .event-label { font-size: 0.85rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text); transition: opacity 0.2s; }
        .event-text { display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
        .event-time-label { font-size: 0.7rem; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; transition: opacity 0.2s; }
        .event-checkbox-input:not(:checked) ~ .event-text .event-label { opacity: 0.4; }
        .event-checkbox-input:not(:checked) ~ .event-text .event-time-label { opacity: 0.25; }

        .dot-btn { background: transparent; border: none; color: var(--text-muted); cursor: pointer; padding: 4px; border-radius: 4px; opacity: 0.3; transition: all 0.2s; margin-right: 4px; }
        .list-item:hover .dot-btn { opacity: 1; }
        .dot-btn:hover { color: var(--text); background: var(--border-light); }

        .move-btns { display: flex; flex-direction: column; gap: 1px; margin-right: 2px; flex-shrink: 0; }
        .move-btn { background: transparent; border: none; color: var(--text-muted); cursor: pointer; padding: 1px 3px; border-radius: 3px; opacity: 0; transition: all 0.15s; line-height: 1; }
        .list-item:hover .move-btn { opacity: 0.6; }
        .move-btn:hover { color: var(--text); background: var(--border-light); opacity: 1 !important; }
        .move-btn svg { width: 11px; height: 11px; stroke: currentColor; stroke-width: 2.5; fill: none; }

        .list-item[draggable="true"] { cursor: grab; }
        .list-item[draggable="true"]:active { cursor: grabbing; }
        .list-item.drag-over-top { border-top: 2px solid var(--accent); margin-top: -2px; }
        .list-item.drag-over-bottom { border-bottom: 2px solid var(--accent); }
        .list-item.dragging { opacity: 0.35; }

        .sidebar-bottom { padding: 8px 8px 20px; flex-shrink: 0; display: none; }
        body.sidebar-open .sidebar-bottom { display: block; padding: 8px 12px 20px; }
        .sidebar-bottom-row { display: grid; grid-template-columns: 1fr auto; gap: 4px; }
        .sidebar-item { display: flex; align-items: center; padding: 9px 12px; color: var(--text-muted); cursor: pointer; border: none; background: transparent; width: 100%; text-align: left; font-family: 'Inter', sans-serif; font-size: 0.85rem; border-radius: 8px; }
        .sidebar-item:hover { color: var(--text); background: var(--card); }
        .sidebar-item svg.icon-main { width: 18px; height: 18px; flex-shrink: 0; fill: none; stroke: currentColor; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
        .sidebar-label { margin-left: 10px; font-weight: 500; }
        
        .sidebar-icon-btn { display: flex; align-items: center; justify-content: center; width: 38px; height: 38px; border-radius: 8px; border: none; background: transparent; color: var(--text-muted); cursor: pointer; transition: background 0.2s, color 0.2s; }
        .sidebar-icon-btn:hover { background: var(--card); color: var(--text); }

        /* ── SETTINGS PANEL ── */
        #settings-panel { flex: 1; display: none; flex-direction: column; overflow-y: auto; }
        body.settings-open #left-sidebar { width: var(--sidebar-expanded); }
        body.settings-open .sidebar-content-scroll { display: none !important; }
        body.settings-open #settings-panel { display: flex; }
        .settings-panel-header { display: flex; align-items: center; gap: 10px; padding: 14px 16px 10px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
        .settings-back-btn { background: transparent; border: none; color: var(--text-muted); cursor: pointer; width: 28px; height: 28px; border-radius: 6px; display: flex; align-items: center; justify-content: center; }
        .settings-back-btn:hover { background: var(--card); color: var(--text); }
        .settings-back-btn svg { width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
        .settings-panel-title { font-size: 0.80rem; font-weight: 600; color: var(--text); text-transform: uppercase; letter-spacing: 0.05em; }
        .settings-section { padding: 16px 16px 0; display: flex; flex-direction: column; gap: 10px; border-bottom: 1px solid var(--border); padding-bottom: 16px; }
        .settings-section:last-child { border-bottom: none; }
        .settings-section-label { font-size: 0.65rem; letter-spacing: 0.12em; color: var(--text-muted); font-weight: 600; text-transform: uppercase; }
        
        .theme-switcher { display: flex; gap: 6px; }
        .theme-btn { flex: 1; background: transparent; border: 1px solid transparent; color: var(--text-muted); padding: 8px 0; border-radius: 8px; cursor: pointer; font-family: 'Inter', sans-serif; font-size: 0.85rem; font-weight: 500; transition: all 0.2s; }
        .theme-btn:hover { background: var(--surface); color: var(--text); }
        .theme-btn.active { background: transparent; color: var(--text); border-color: var(--text); }
        .form-label { font-size: 0.72rem; color: var(--text-muted); display: block; margin-bottom: 5px; font-weight: 500; }
        .form-field { display: flex; flex-direction: column; }

        /* ── MAIN CONTENT & MONTH-BY-MONTH GRID ── */
        #main-content { flex: 1; display: flex; flex-direction: column; position: relative; overflow: hidden; min-width: 0; }
        .btn-fullscreen { position: absolute; top: 24px; right: 24px; z-index: 100; background: transparent; border: 1px solid transparent; color: var(--text-muted); cursor: pointer; width: 40px; height: 40px; border-radius: 8px; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
        .btn-fullscreen:hover { background: var(--surface); border-color: var(--border); color: var(--text); }
        .btn-fullscreen svg { width: 20px; height: 20px; fill: none; stroke: currentColor; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }

        .main-header { padding: 36px 40px 16px; text-align: center; flex-shrink: 0; }
        .main-header h2 { font-family: 'Space Grotesk', sans-serif; font-size: 1.8rem; font-weight: 400; font-style: italic; letter-spacing: -0.02em; margin-bottom: 12px; color: var(--text); }
        #header-stats { font-family: 'Space Grotesk', sans-serif; font-size: 0.9rem; color: var(--text-muted); }
        #header-stats span { color: var(--text); font-weight: 500; }

        .calendar-wrapper { flex: 1; padding: 24px 40px 40px; overflow: auto; display: flex; justify-content: center; }
        .grid-scroll-area { display: flex; flex-direction: column; padding-bottom: 60px; max-width: 100%; min-width: min-content; }
        
        .year-wrapper { display: flex; flex-direction: column; margin-bottom: 32px; }
        .year-divider { display: flex; align-items: center; gap: 16px; margin: 8px 0 16px 0; }
        .year-divider span { font-family: 'Space Grotesk', sans-serif; font-size: 1.25rem; font-weight: 700; color: var(--text); letter-spacing: -0.02em; }
        .year-divider .line { flex: 1; height: 1px; background: var(--border-light); }

        .month-row { display: flex; gap: 4px; margin-bottom: 4px; align-items: center; }
        .header-row { margin-bottom: 12px; }
        
        /* DIPERBESAR 20% DARI 32px KE 38px DAN FONT 0.65 KE 0.72rem AGAR SEIMBANG */
        .month-label { width: 38px; font-size: 0.72rem; color: var(--text-muted); font-family: 'Space Grotesk', sans-serif; text-align: right; margin-right: 12px; flex-shrink: 0; text-transform: uppercase; font-weight: 600; letter-spacing: 0.05em; }
        
        /* DIPERBESAR 20% DARI 14px KE 17px DAN FONT 0.55 KE 0.66rem */
        .day-number { width: 17px; text-align: center; font-size: 0.66rem; color: var(--text-muted); font-family: 'Space Grotesk', sans-serif; flex-shrink: 0; }
        
        /* DIPERBESAR 20% DARI 14px KE 17px */
        .day-box { width: 17px; height: 17px; border: 1px solid var(--border); border-radius: 4px; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); cursor: crosshair; flex-shrink: 0; }
        
        .day-box:not(.empty-placeholder):not(.out-of-bounds):hover { transform: scale(1.4); z-index: 10; border-color: var(--text); box-shadow: 0 0 12px rgba(0,0,0,0.3); }
        
        .day-box.lived { background-color: var(--lived); border-color: var(--lived); }
        .day-box.current { border: 2px solid var(--accent); box-shadow: 0 0 8px var(--accent-glow); }
        
        .day-box.empty-placeholder { border: none; background: transparent; cursor: default; pointer-events: none; }
        .day-box.out-of-bounds { border: 1px dashed var(--border-light); opacity: 0.15; cursor: not-allowed; }

        /* ── MENUS & TOOLTIP ── */
        .dot-menu, .arrange-menu, .arrange-submenu { position: fixed; background: var(--card); border: 1px solid var(--border-light); border-radius: 8px; padding: 4px; z-index: 3000; box-shadow: 0 4px 20px rgba(0,0,0,0.35); display: none; min-width: 130px; }
        .dot-menu.open, .arrange-menu.open, .arrange-submenu.open { display: block; }
        .dot-menu-item, .arrange-item, .arrange-subitem { display: flex; align-items: center; gap: 8px; padding: 7px 10px; border-radius: 5px; font-size: 0.82rem; cursor: pointer; color: var(--text); background: transparent; border: none; width: 100%; text-align: left; font-family: 'Inter', sans-serif; transition: background 0.15s; }
        .dot-menu-item:hover, .arrange-item:hover, .arrange-subitem:hover { background: var(--surface); }
        .dot-menu-item svg, .arrange-item-left svg { width: 13px; height: 13px; stroke: currentColor; stroke-width: 2; fill: none; flex-shrink: 0; }
        .dot-menu-item.danger { color: #e05252; } .dot-menu-item.danger:hover { background: rgba(224,82,82,0.1); }
        .arrange-item-left { display: flex; align-items: center; gap: 8px; }
        .arrange-item.has-active .arrange-item-left { color: var(--accent); }
        .arrange-chevron { width: 10px; height: 10px; stroke: var(--text-muted); stroke-width: 2; fill: none; flex-shrink: 0; }
        .arrange-divider { height: 1px; background: var(--border); margin: 4px 0; }
        .arrange-subitem.active { color: var(--accent); font-weight: 600; }
        .arrange-subitem .check-icon { width: 12px; height: 12px; stroke: currentColor; stroke-width: 2.5; fill: none; opacity: 0; margin-left: auto; }
        .arrange-subitem.active .check-icon { opacity: 1; }
        .submenu-label { font-size: 0.62rem; color: var(--text-muted); padding: 6px 10px 3px; letter-spacing: 0.06em; text-transform: uppercase; font-weight: 600; }
        
        #tooltip { position: fixed; background: var(--surface); border: 1px solid var(--border-light); color: var(--text); padding: 12px 16px; border-radius: var(--radius-sm); font-size: 0.8rem; pointer-events: none; opacity: 0; z-index: 2000; box-shadow: 0 10px 30px rgba(0,0,0,0.4); transition: opacity 0.2s; line-height: 1.4; white-space: nowrap; }
    </style>
</head>
<body data-theme="dark">

    <aside id="left-sidebar">
        <div class="sidebar-header">
            <button class="sidebar-toggle" onclick="toggleSidebar()" title="Toggle Sidebar">
                <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="9" y1="3" x2="9" y2="21"></line></svg>
            </button>
            <span class="sidebar-title">Daily Calendar</span>
        </div>

        <div class="sidebar-content-scroll">
            
            <div class="accordion open" id="acc-config">
                <div class="accordion-header" onclick="toggleAccordion('acc-config')">
                    <span class="acc-title">Configuration</span>
                    <div class="acc-actions">
                        <button class="acc-btn chevron"><svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"></polyline></svg></button>
                    </div>
                </div>
                <div class="accordion-body">
                    <div class="form-field">
                        <label class="form-label">Start Date</label>
                        <input type="date" id="startDateInput" class="sidebar-input">
                    </div>
                    <div class="form-field">
                        <label class="form-label">View Duration</label>
                        <div class="duration-grid">
                            <div>
                                <label class="form-label" style="font-size:0.65rem; color:var(--text-mid);">Years</label>
                                <input type="number" id="durationYears" class="sidebar-input" min="0" max="5" onchange="updateDuration()">
                            </div>
                            <div>
                                <label class="form-label" style="font-size:0.65rem; color:var(--text-mid);">Months</label>
                                <input type="number" id="durationMonths" class="sidebar-input" min="0" max="11" onchange="updateDuration()">
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="accordion" id="acc-form">
                <div class="accordion-header" onclick="toggleAccordion('acc-form')">
                    <span class="acc-title" id="form-acc-title">Add New Event</span>
                    <div class="acc-actions">
                        <button class="acc-btn chevron"><svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"></polyline></svg></button>
                    </div>
                </div>
                <div class="accordion-body">
                    <div class="form-field">
                        <span class="form-label">Type</span>
                        <select id="modeSelect" class="sidebar-input" onchange="onModeChange(this.value)">
                            <option value="phase">✦ Long Phase</option>
                            <option value="event">📍 Specific Day</option>
                        </select>
                    </div>
                    <div class="form-field">
                        <span class="form-label">Name</span>
                        <input type="text" id="itemName" class="sidebar-input" placeholder="e.g., Development, Holiday...">
                    </div>

                    <div class="form-field" id="field-phase-dates" style="gap:8px;">
                        <div class="form-field">
                            <span class="form-label">Start Date</span>
                            <input type="date" id="phaseStartDate" class="sidebar-input">
                        </div>
                        <div class="form-field">
                            <span class="form-label">End Date</span>
                            <input type="date" id="phaseEndDate" class="sidebar-input">
                        </div>
                    </div>

                    <div class="form-field" id="field-event-date" style="display:none;">
                        <span class="form-label">Date</span>
                        <input type="date" id="eventDate" class="sidebar-input">
                    </div>

                    <div class="form-field">
                        <span class="form-label">Color</span>
                        <input type="color" id="itemColor" class="sidebar-input" value="#efefef" style="padding: 2px; cursor: pointer; height: 34px; width: 100%;">
                    </div>
                    
                    <div class="sidebar-form-actions">
                        <button class="btn-primary" id="btnSubmitItem" onclick="submitItem()">Save Data</button>
                        <button id="btnCancelEdit" class="btn-secondary" style="display: none;" onclick="cancelEdit()">
                            <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg> Back
                        </button>
                    </div>
                </div>
            </div>

            <div class="accordion open" id="acc-list">
                <div class="accordion-header" onclick="toggleAccordion('acc-list')">
                    <div style="display:flex; flex-direction:column; gap:4px;">
                        <span class="acc-title">Your Calendar Data</span>
                        <span id="arrange-label-chip" style="font-size:0.62rem; color:var(--text-muted); display:none;"></span>
                    </div>
                    <div class="acc-actions">
                        <button class="acc-btn" onclick="openArrangeMenu(event)" id="btn-arrange" title="Arrange">
                            <svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><polyline points="3 6 4 7 6 4"/><polyline points="3 12 4 13 6 10"/><polyline points="3 18 4 19 6 16"/></svg>
                        </button>

            <div class="settings-section">

                    Hapus Cache Total

        <div class="sidebar-bottom">
            <div class="sidebar-bottom-row">
                <button class="sidebar-item" onclick="toggleSettings(event)">
                    <svg class="icon-main" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                    <span class="sidebar-label">Settings</span>

    </aside>

    <main id="main-content">
        <button class="btn-fullscreen" onclick="toggleFullscreen()" title="Fullscreen">
            <svg id="icon-fs-expand" viewBox="0 0 24 24"><polyline points="15 3 21 3 21 9"></polyline><polyline points="9 21 3 21 3 15"></polyline><line x1="21" y1="3" x2="14" y2="10"></line><line x1="3" y1="21" x2="10" y2="14"></line></svg>
            <svg id="icon-fs-shrink" viewBox="0 0 24 24" style="display:none;"><polyline points="4 14 10 14 10 20"></polyline><polyline points="20 10 14 10 14 4"></polyline><line x1="14" y1="10" x2="21" y2="3"></line><line x1="3" y1="21" x2="10" y2="14"></line></svg>
        </button>

        <header class="main-header">
            <h2>"Make every single day count."</h2>
            <div id="header-stats">
                Total: <span id="stat-total">0</span> Days &bull; Passed: <span id="stat-lived">0</span> &bull; Remaining: <span id="stat-rem">0</span>
            </div>
        </header>

        <div class="calendar-wrapper">
            <div class="grid-scroll-area" id="yearsContainer">
                </div>
        </div>
    </main>

    <div id="tooltip"></div>

    <div id="dot-menu" class="dot-menu">
        <button class="dot-menu-item" onclick="dotMenuEdit()"><svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg> Edit</button>
        <button class="dot-menu-item danger" onclick="deleteItemAction()"><svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg> Delete</button>
    </div>

    <div id="arrange-menu" class="arrange-menu">
        <div class="submenu-label">Arrange</div>
        <button class="arrange-item" onmouseenter="showSortSubmenu(this)">
            <span class="arrange-item-left"><svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/></svg> Sort</span>
            <svg class="arrange-chevron" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"></polyline></svg>
        </button>
        <button class="arrange-item" onmouseenter="showFilterSubmenu(this)">
            <span class="arrange-item-left"><svg viewBox="0 0 24 24"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon></svg> Filter</span>
            <svg class="arrange-chevron" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"></polyline></svg>
        </button>
    </div>

    <div id="sort-submenu" class="arrange-submenu" onmouseleave="closeSortSubmenu()">
        <div class="submenu-label">Sort by duration</div>
        <button class="arrange-subitem" id="sort-none-btn" onclick="setSortMode('none')">Default <svg class="check-icon" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg></button>
        <button class="arrange-subitem" id="sort-asc-btn" onclick="setSortMode('asc')">↑ Shortest <svg class="check-icon" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg></button>
        <button class="arrange-subitem" id="sort-desc-btn" onclick="setSortMode('desc')">↓ Longest <svg class="check-icon" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg></button>
        <div class="submenu-label" style="margin-top:4px;">Sort by date</div>
        <button class="arrange-subitem" id="sort-earliest-btn" onclick="setSortMode('earliest')">↑ Earliest <svg class="check-icon" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg></button>
        <button class="arrange-subitem" id="sort-latest-btn" onclick="setSortMode('latest')">↓ Latest <svg class="check-icon" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg></button>
        <div class="arrange-divider"></div>
        <button class="arrange-subitem" id="sort-custom-btn" onclick="setSortMode('custom')">Custom order <svg class="check-icon" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg></button>
    </div>

    <div id="filter-submenu" class="arrange-submenu" onmouseleave="closeFilterSubmenu()">
        <div class="submenu-label">Show type</div>
        <button class="arrange-subitem" id="filter-all-btn" onclick="setFilterMode('all')">All items <svg class="check-icon" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg></button>
        <button class="arrange-subitem" id="filter-events-btn" onclick="setFilterMode('events')">📍 Events <svg class="check-icon" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg></button>
        <button class="arrange-subitem" id="filter-phases-btn" onclick="setFilterMode('phases')">✦ Phases <svg class="check-icon" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg></button>
    </div>

<script>
    // --- STATE ---
    const LOCAL_KEY = 'myDailyCalendar_v4';
    
    // Kita simpan durasi total dalam bulan agar kompatibel dengan logika sebelumnya
    const defaultData = {
        startDate: new Date(new Date().getFullYear(), 0, 1).toISOString().split('T')[0],
        duration: 36, // 3 Years default (36 bulan)
        theme: 'dark',
        items: []
    };

    let appData = JSON.parse(localStorage.getItem(LOCAL_KEY)) || defaultData;
    let hiddenIds = new Set();
    let editId = null;
    let currentMode = 'phase';

    function parseLocalDate(dateStr) {
        return new Date(dateStr + 'T00:00:00');
    }

    function updateDuration() {
        let y = parseInt(document.getElementById('durationYears').value) || 0;
        let m = parseInt(document.getElementById('durationMonths').value) || 0;

        // Atur batasan
        if (y < 0) y = 0; if (y > 5) y = 5;
        if (m < 0) m = 0; if (m > 11) m = 11;
        
        // Mencegah durasi kosong (minimal 1 bulan)
        if (y === 0 && m === 0) {
            m = 1;
        }

        document.getElementById('durationYears').value = y;
        document.getElementById('durationMonths').value = m;

        appData.duration = (y * 12) + m;
        saveAndRender();
    }

    function init() {
        document.getElementById('startDateInput').value = appData.startDate;
        document.getElementById('startDateInput').onchange = (e) => {
            appData.startDate = e.target.value;
            saveAndRender();
        };

        // Konversi total durasi bulan ke bentuk Tahun dan Bulan
        document.getElementById('durationYears').value = Math.floor(appData.duration / 12);
        document.getElementById('durationMonths').value = appData.duration % 12;

        setTheme(appData.theme || 'dark');
        document.addEventListener('mousemove', updateTooltipPos);
        ghLoadCreds();
        render();
    }

    // --- SIDEBAR UI ---
    function toggleSidebar(forceOpen) {
        if(forceOpen) document.body.classList.add('sidebar-open');
        else document.body.classList.toggle('sidebar-open');
    }
    function toggleAccordion(id) { document.getElementById(id).classList.toggle('open'); }
    function openAddEvent(e) {
        if(e) e.stopPropagation();
        toggleSidebar(true);
        document.getElementById('acc-form').classList.add('open');
        cancelEdit();
        document.getElementById('itemName').focus();
    }
    function toggleSettings(e) {
        if(e) e.stopPropagation();
        if (document.body.classList.contains('settings-open')) closeSettings();
        else { toggleSidebar(true); document.body.classList.add('settings-open'); }
    }
    function closeSettings() { document.body.classList.remove('settings-open'); }

    document.addEventListener('click', (e) => {
        if (!e.target.closest('#dot-menu') && !e.target.closest('.dot-btn')) closeDotMenu();
        if (!e.target.closest('#arrange-menu') && !e.target.closest('.arrange-submenu') && !e.target.closest('#btn-arrange')) {
            document.getElementById('arrange-menu').classList.remove('open');
            closeSortSubmenu(); closeFilterSubmenu();
        }
    });

    // --- FULLSCREEN ---
    function toggleFullscreen() {
        if (!document.fullscreenElement) document.documentElement.requestFullscreen();
        else if (document.exitFullscreen) document.exitFullscreen();
    }
    document.addEventListener('fullscreenchange', () => {
        const isFS = document.fullscreenElement !== null;
        document.getElementById('icon-fs-expand').style.display = isFS ? 'none' : 'block';
        document.getElementById('icon-fs-shrink').style.display = isFS ? 'block' : 'none';
    });

    // --- MAIN RENDER (MONTH-BY-MONTH GRID, 31 DAYS ACROSS) ---
    function render() {
        const container = document.getElementById('yearsContainer');
        container.innerHTML = '';
        
        if(!appData.startDate) return;

        const startDt = parseLocalDate(appData.startDate);
        
        // Target end date (Duration in months)
        const targetEnd = new Date(startDt);
        targetEnd.setMonth(startDt.getMonth() + appData.duration);
        targetEnd.setDate(targetEnd.getDate() - 1); 

        const today = new Date();
        today.setHours(0,0,0,0);

        let totalCount = 0; 
        let livedCount = 0;

        let currentYearNum = -1;
        let currentYearWrapper = null;

        // Loop month by month starting from the 1st of the starting month
        let iterMonth = new Date(startDt.getFullYear(), startDt.getMonth(), 1);
        const endMonth = new Date(targetEnd.getFullYear(), targetEnd.getMonth(), 1);

        while (iterMonth <= endMonth) {
            const y = iterMonth.getFullYear();
            const m = iterMonth.getMonth();

            // Mulai render block tahun baru
            if (y !== currentYearNum) {
                currentYearNum = y;
                
                currentYearWrapper = document.createElement('div');
                currentYearWrapper.className = 'year-wrapper';

                const divider = document.createElement('div');
                divider.className = 'year-divider';
                divider.innerHTML = `<span>${y}</span><div class="line"></div>`;
                currentYearWrapper.appendChild(divider);

                // Buat Header Row untuk Tanggal (1 - 31)
                const headerRow = document.createElement('div');
                headerRow.className = 'month-row header-row';
                
                // Tempat kosong untuk ruang label bulan
                const emptyLabel = document.createElement('div');
                emptyLabel.className = 'month-label';
                headerRow.appendChild(emptyLabel);
                
                for(let d = 1; d <= 31; d++) {
                    const dnum = document.createElement('div');
                    dnum.className = 'day-number';
                    dnum.innerText = d;
                    headerRow.appendChild(dnum);
                }
                currentYearWrapper.appendChild(headerRow);
                container.appendChild(currentYearWrapper);
            }

            // Buat baris (row) untuk 1 bulan
            const monthRow = document.createElement('div');
            monthRow.className = 'month-row';
            
            const mLabel = document.createElement('div');
            mLabel.className = 'month-label';
            mLabel.innerText = iterMonth.toLocaleString('en-US', { month: 'short' });
            monthRow.appendChild(mLabel);

            // Cari tahu bulan ini punya berapa hari (28/29/30/31)
            const daysInMonth = new Date(y, m + 1, 0).getDate();

            // Looping ke samping pasti 31 box (untuk menyejajarkan grid)
            for (let d = 1; d <= 31; d++) {
                const box = document.createElement('div');
                
                // Jika tanggal melebihi total hari di bulan tersebut, kasih placeholder kosong tak terlihat
                if (d > daysInMonth) {
                    box.className = 'day-box empty-placeholder';
                    monthRow.appendChild(box);
                    continue;
                }

                const curDt = new Date(y, m, d);

                // Jika kotak harinya valid, tapi posisinya mendahului Start Date atau melebihi End Date, buat jadi samar
                if (curDt < startDt || curDt > targetEnd) {
                    box.className = 'day-box out-of-bounds';
                    monthRow.appendChild(box);
                    continue;
                }

                box.className = 'day-box';

                if (curDt < today) { box.classList.add('lived'); livedCount++; }
                else if (curDt.getTime() === today.getTime()) box.classList.add('current');
                
                totalCount++; 

                let bgColor = '';
                // Format Tooltip yang bersih: "Jan 15, 2024"
                let tipHtml = `<div style="font-size:0.85rem; margin-bottom:4px; font-weight:500;">${curDt.toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'})}</div>`;

                const activePhase = appData.items.find(i => {
                    if (i.type !== 'phase' || hiddenIds.has(i.id)) return false;
                    if (!(filterMode === 'all' || filterMode === 'phases')) return false;
                    return curDt >= parseLocalDate(i.startDate) && curDt <= parseLocalDate(i.endDate);
                });
                if (activePhase) {
                    bgColor = activePhase.color;
                    tipHtml += `<div style="color:${bgColor}; font-weight:600; font-size:0.75rem;">✦ ${activePhase.name}</div>`;
                }

                const activeEvent = appData.items.find(i => {
                    if (i.type !== 'event' || hiddenIds.has(i.id)) return false;
                    if (!(filterMode === 'all' || filterMode === 'events')) return false;
                    return curDt.getTime() === parseLocalDate(i.date).getTime();
                });
                if (activeEvent) {
                    bgColor = activeEvent.color;
                    box.style.borderColor = activeEvent.color;
                    box.style.boxShadow = `0 0 6px ${activeEvent.color}88`;
                    tipHtml += `<div style="color:${activeEvent.color}; font-weight:600; font-size:0.75rem;">📍 ${activeEvent.name}</div>`;
                }

                if (bgColor) box.style.backgroundColor = bgColor;
                
                box.onmouseenter = (e) => showTooltip(e, tipHtml);
                box.onmouseleave = hideTooltip;
                monthRow.appendChild(box);
            }

            currentYearWrapper.appendChild(monthRow);
            
            // Maju 1 bulan
            iterMonth.setMonth(iterMonth.getMonth() + 1);
        }

        document.getElementById('stat-total').innerText = totalCount.toLocaleString();
        document.getElementById('stat-lived').innerText = livedCount.toLocaleString();
        document.getElementById('stat-rem').innerText = Math.max(0, totalCount - livedCount).toLocaleString();

        renderSidebarList();
    }

    // --- FORM LOGIC ---
    function onModeChange(val) {
        currentMode = val;
        document.getElementById('field-phase-dates').style.display = val === 'phase' ? 'flex' : 'none';
        document.getElementById('field-event-date').style.display = val === 'event' ? 'flex' : 'none';
    }

    function submitItem() {
        const name = document.getElementById('itemName').value.trim();
        const color = document.getElementById('itemColor').value;
        if (!name) return;

        let newItem = { id: editId || Date.now(), type: currentMode, name, color };

        if (currentMode === 'phase') {
            newItem.startDate = document.getElementById('phaseStartDate').value;
            newItem.endDate = document.getElementById('phaseEndDate').value;
            if (!newItem.startDate || !newItem.endDate) return;
        } else {
            newItem.date = document.getElementById('eventDate').value;
            if (!newItem.date) return;
        }

        if (editId) {
            const idx = appData.items.findIndex(i => i.id === editId);
            appData.items[idx] = newItem;
        } else {
            appData.items.push(newItem);
            if(!appData.customOrder) appData.customOrder = [];
            appData.customOrder.push(newItem.id);
        }

        saveAndRender(); cancelEdit();
    }

    function editItem(id) {
        const item = appData.items.find(i => i.id === id);
        if(!item) return;
        toggleSidebar(true);
        editId = id;
        document.getElementById('modeSelect').value = item.type;
        onModeChange(item.type);
        
        document.getElementById('itemName').value = item.name;
        document.getElementById('itemColor').value = item.color;
        
        if (item.type === 'phase') {
            document.getElementById('phaseStartDate').value = item.startDate;
            document.getElementById('phaseEndDate').value = item.endDate;
        } else {
            document.getElementById('eventDate').value = item.date;
        }
        
        document.getElementById('form-acc-title').innerText = "Edit Data";
        document.getElementById('btnSubmitItem').innerText = "Update";
        document.getElementById('btnCancelEdit').style.display = 'flex';
        document.getElementById('acc-form').classList.add('open');
    }

    function cancelEdit() {
        editId = null;
        document.getElementById('itemName').value = '';
        document.getElementById('phaseStartDate').value = '';
        document.getElementById('phaseEndDate').value = '';
        document.getElementById('eventDate').value = '';
        document.getElementById('form-acc-title').innerText = "Add New Event";
        document.getElementById('btnSubmitItem').innerText = "Save Data";
        document.getElementById('btnCancelEdit').style.display = 'none';
        document.getElementById('modeSelect').value = 'phase';
        onModeChange('phase');
    }

    function deleteItemAction() {
        if(!activeDotMenuId) return;
        appData.items = appData.items.filter(i => i.id !== activeDotMenuId);
        if(appData.customOrder) appData.customOrder = appData.customOrder.filter(id => id !== activeDotMenuId);
        saveAndRender(); closeDotMenu();
    }

    // --- SIDEBAR LIST & SORTING ---
    let sortMode = 'none', filterMode = 'all';

    function renderSidebarList() {
        const list = document.getElementById('viewListContainer');
        list.innerHTML = '';
        
        const labelChip = document.getElementById('arrange-label-chip');
        const chipParts = [];
        if (sortMode !== 'none') chipParts.push(sortMode);
        if (filterMode !== 'all') chipParts.push(filterMode);
        if (chipParts.length) { labelChip.textContent = chipParts.join(' · '); labelChip.style.display = 'inline'; }
        else labelChip.style.display = 'none';

        let items = [...appData.items];
        if (filterMode === 'events') items = items.filter(i => i.type === 'event');
        else if (filterMode === 'phases') items = items.filter(i => i.type === 'phase');

        const getDur = (i) => i.type === 'phase' ? parseLocalDate(i.endDate) - parseLocalDate(i.startDate) : 0;
        const getStart = (i) => i.type === 'phase' ? parseLocalDate(i.startDate).getTime() : parseLocalDate(i.date).getTime();

        if (sortMode === 'asc') items.sort((a,b) => getDur(a) - getDur(b));
        else if (sortMode === 'desc') items.sort((a,b) => getDur(b) - getDur(a));
        else if (sortMode === 'earliest') items.sort((a,b) => getStart(a) - getStart(b));
        else if (sortMode === 'latest') items.sort((a,b) => getStart(b) - getStart(a));
        else if (sortMode === 'custom') items = getCustomOrderedItems(items);

        items.forEach(item => {
            const el = document.createElement('div');
            el.className = 'list-item';
            
            const timeLabel = item.type === 'phase' 
                ? `${item.startDate} to ${item.endDate}` 
                : item.date;

            const moveBtns = sortMode === 'custom' ? `
                <div class="move-btns">
                    <button class="move-btn" onclick="moveItem(${item.id}, -1)"><svg viewBox="0 0 24 24"><polyline points="18 15 12 9 6 15"></polyline></svg></button>
                    <button class="move-btn" onclick="moveItem(${item.id}, 1)"><svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"></polyline></svg></button>
                </div>` : '';

            el.innerHTML = `
                <label class="event-checkbox-wrapper">
                    <input type="checkbox" class="event-checkbox-input" ${!hiddenIds.has(item.id) ? 'checked' : ''} onchange="toggleFilter(${item.id})">
                    <div class="event-checkbox-box" style="--box-color: ${item.color}"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg></div>
                    <div class="event-text">
                        <span class="event-label">${item.name}</span>
                        <span class="event-time-label">${timeLabel}</span>
                    </div>
                </label>
                ${moveBtns}
                <button class="dot-btn" onclick="openDotMenu(event, ${item.id})"><svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg></button>
            `;

            if(sortMode === 'custom') {
                el.setAttribute('draggable', 'true');
                el.addEventListener('dragstart', (e) => { e.dataTransfer.effectAllowed='move'; _dragId=item.id; el.classList.add('dragging'); });
                el.addEventListener('dragend', () => { document.querySelectorAll('.list-item').forEach(x=>x.classList.remove('dragging','drag-over-top','drag-over-bottom')); _dragId=null; });
                el.addEventListener('dragover', (e) => { e.preventDefault(); el.classList.remove('drag-over-top','drag-over-bottom'); const rect = el.getBoundingClientRect(); if(e.clientY < rect.top+rect.height/2) el.classList.add('drag-over-top'); else el.classList.add('drag-over-bottom'); });
                el.addEventListener('drop', (e) => { e.preventDefault(); if(_dragId && _dragId!==item.id) { const rect = el.getBoundingClientRect(); dropItem(_dragId, item.id, e.clientY < rect.top+rect.height/2); }});
            }
            list.appendChild(el);
        });
    }

    let _dragId = null;
    function toggleFilter(id) { hiddenIds.has(id) ? hiddenIds.delete(id) : hiddenIds.add(id); render(); }

    function getCustomOrderedItems(filteredItems) {
        if(!appData.customOrder) appData.customOrder = appData.items.map(i=>i.id);
        const map = new Map(appData.customOrder.map((id,i) => [id,i]));
        return filteredItems.sort((a,b) => (map.get(a.id)||99) - (map.get(b.id)||99));
    }
    function moveItem(id, dir) {
        if(!appData.customOrder) return;
        const idx = appData.customOrder.indexOf(id);
        if(idx===-1 || idx+dir<0 || idx+dir>=appData.customOrder.length) return;
        [appData.customOrder[idx], appData.customOrder[idx+dir]] = [appData.customOrder[idx+dir], appData.customOrder[idx]];
        saveAndRender();
    }
    function dropItem(srcId, tgtId, isBefore) {
        const srcIdx = appData.customOrder.indexOf(srcId);
        appData.customOrder.splice(srcIdx, 1);
        const tgtIdx = appData.customOrder.indexOf(tgtId);
        appData.customOrder.splice(isBefore ? tgtIdx : tgtIdx+1, 0, srcId);
        saveAndRender();
    }

    // --- MENUS ---
    let activeDotMenuId = null;
    function openDotMenu(e, id) {
        e.stopPropagation(); activeDotMenuId = id;
        const m = document.getElementById('dot-menu'), r = e.currentTarget.getBoundingClientRect();
        m.style.left = Math.max(8, r.right - 130) + 'px'; m.style.top = (r.bottom + 4) + 'px';
        m.classList.add('open');
    }
    function closeDotMenu() { document.getElementById('dot-menu').classList.remove('open'); }
    function dotMenuEdit() { const id = activeDotMenuId; closeDotMenu(); if(id) editItem(id); }

    function openArrangeMenu(e) {
        e.stopPropagation();
        const m = document.getElementById('arrange-menu');
        if(m.classList.contains('open')) { m.classList.remove('open'); return; }
        const r = e.currentTarget.getBoundingClientRect();
        m.style.left = Math.max(8, r.right - 140) + 'px'; m.style.top = (r.bottom + 4) + 'px';
        m.classList.add('open');
        updateMenuChecks();
    }
    
    function showSortSubmenu(el) { const m=document.getElementById('sort-submenu'), r=el.getBoundingClientRect(), p=document.getElementById('arrange-menu').getBoundingClientRect(); m.style.top=r.top+'px'; m.style.left=(p.right+4)+'px'; m.classList.add('open'); closeFilterSubmenu(); }
    function closeSortSubmenu() { document.getElementById('sort-submenu').classList.remove('open'); }
    function showFilterSubmenu(el) { const m=document.getElementById('filter-submenu'), r=el.getBoundingClientRect(), p=document.getElementById('arrange-menu').getBoundingClientRect(); m.style.top=r.top+'px'; m.style.left=(p.right+4)+'px'; m.classList.add('open'); closeSortSubmenu(); }
    function closeFilterSubmenu() { document.getElementById('filter-submenu').classList.remove('open'); }

    function setSortMode(m) { if(m==='custom' && sortMode!=='custom') appData.customOrder = appData.items.map(i=>i.id); sortMode=m; saveAndRender(); document.getElementById('arrange-menu').classList.remove('open'); closeSortSubmenu(); }
    function setFilterMode(m) { filterMode=m; render(); document.getElementById('arrange-menu').classList.remove('open'); closeFilterSubmenu(); }
    function updateMenuChecks() {
        ['none','asc','desc','earliest','latest','custom'].forEach(m=>document.getElementById(`sort-${m}-btn`).classList.toggle('active', sortMode===m));
        ['all','events','phases'].forEach(m=>document.getElementById(`filter-${m}-btn`).classList.toggle('active', filterMode===m));
    }

    // --- UTILS ---
    function showTooltip(e, html) { const t=document.getElementById('tooltip'); t.innerHTML=html; t.style.opacity='1'; updateTooltipPos(e); }
    function hideTooltip() { document.getElementById('tooltip').style.opacity='0'; }
    function updateTooltipPos(e) { const t=document.getElementById('tooltip'); if(t.style.opacity==='0')return; let x=e.clientX+15, y=e.clientY-40; if(x+t.offsetWidth>window.innerWidth) x=e.clientX-t.offsetWidth-15; t.style.left=x+'px'; t.style.top=y+'px'; }
    
    function setTheme(t) {
        document.body.setAttribute('data-theme', t); appData.theme = t; localStorage.setItem(LOCAL_KEY, JSON.stringify(appData));
        document.querySelectorAll('.theme-btn').forEach(b => b.classList.toggle('active', b.getAttribute('data-theme')===t));
    }

    function saveAndRender() { localStorage.setItem(LOCAL_KEY, JSON.stringify(appData)); render(); }
    function executeClearCache() { localStorage.removeItem(LOCAL_KEY); location.reload(); }

    function ghLoadCreds(){} function ghSaveCreds(){} function githubLoad(){ alert("Load triggered"); } function githubSave(){ alert("Save triggered"); }

    init();
</script>
</body>
</html>
